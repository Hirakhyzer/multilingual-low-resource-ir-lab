<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
<title id="title">Multilingual IR evaluation workflow</title><desc id="desc">Evaluation workflow for retrieval accuracy, QA grounding, OCR robustness, and language fairness.</desc>
<defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#fff9f1"/><stop offset="1" stop-color="#edf7ff"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#31516a" flood-opacity=".16"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#627a91"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:31px;font-weight:700;fill:#19344d}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#60778c}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#287b94}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#19344d}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#49657a}</style></defs>
<rect width="1400" height="620" fill="url(#bg)"/><text x="70" y="72" class="h">Evaluation workflow</text><text x="70" y="104" class="s">Measure retrieval, QA grounding, OCR-noise robustness, and language-level fairness without external data.</text><line x1="70" y1="134" x2="1330" y2="134" stroke="#d6e5ee"/>
<g filter="url(#shadow)"><rect x="85" y="210" width="230" height="220" rx="18" fill="#fff" stroke="#c7d9e4"/><text x="112" y="250" class="tag">STEP 1</text><text x="112" y="292" class="t">Run retrieval</text><text x="112" y="328" class="b">TF-IDF</text><text x="112" y="354" class="b">BM25</text><text x="112" y="380" class="b">Hybrid lexical</text></g>
<g filter="url(#shadow)"><rect x="395" y="210" width="230" height="220" rx="18" fill="#fff" stroke="#c7d9e4"/><text x="422" y="250" class="tag">STEP 2</text><text x="422" y="292" class="t">Stress test</text><text x="422" y="328" class="b">OCR noise rates</text><text x="422" y="354" class="b">Spacing corruption</text><text x="422" y="380" class="b">Script confusion</text></g>
<g filter="url(#shadow)"><rect x="705" y="210" width="230" height="220" rx="18" fill="#fff" stroke="#c7d9e4"/><text x="732" y="250" class="tag">STEP 3</text><text x="732" y="292" class="t">Ground answers</text><text x="732" y="328" class="b">Extractive answer</text><text x="732" y="354" class="b">Chunk citations</text><text x="732" y="380" class="b">Unsupported check</text></g>
<g filter="url(#shadow)"><rect x="1015" y="210" width="300" height="220" rx="18" fill="#173d53"/><text x="1042" y="250" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#79e3dc">STEP 4</text><text x="1042" y="292" style="font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#fff">Audit language fairness</text><text x="1042" y="328" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d5e8f2">Top-k recall by language</text><text x="1042" y="354" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d5e8f2">MRR and robustness gap</text><text x="1042" y="380" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d5e8f2">Report and hash log</text></g>
<path d="M315 320 H382" stroke="#627a91" stroke-width="3" marker-end="url(#arr)"/><path d="M625 320 H692" stroke="#627a91" stroke-width="3" marker-end="url(#arr)"/><path d="M935 320 H1002" stroke="#627a91" stroke-width="3" marker-end="url(#arr)"/>
<text x="70" y="550" style="font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#60778c">All metrics are synthetic regression evidence unless a licensed real corpus and evaluation protocol are added.</text>
</svg>
