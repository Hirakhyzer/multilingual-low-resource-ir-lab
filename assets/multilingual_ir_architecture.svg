<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
<title id="title">Multilingual low-resource IR architecture</title><desc id="desc">Conceptual architecture for Urdu Arabic English and Roman Urdu retrieval with OCR noise robustness citation-grounded QA and fairness audit.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071425"/><stop offset="1" stop-color="#17344f"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".3"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#b9d7e8"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#f8fcff}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#c6ddec}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#f8fcff}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#cbdfea}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#9fb9c9}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#7de3dc}</style></defs>
<rect width="1440" height="760" fill="url(#bg)"/><circle cx="1280" cy="100" r="190" fill="#266176" opacity=".25"/><circle cx="130" cy="730" r="230" fill="#0a7280" opacity=".17"/>
<text x="70" y="74" class="h">Multilingual Low-Resource Information Retrieval Lab</text><text x="70" y="106" class="s">Urdu, Arabic, English, Roman Urdu, OCR-noise robustness, citation-grounded QA, and language-level fairness audit.</text><line x1="70" y1="138" x2="1370" y2="138" stroke="#315d79"/>
<g filter="url(#shadow)"><rect x="70" y="190" width="260" height="200" rx="18" fill="#12334c" stroke="#47728b"/><text x="96" y="228" class="tag">01 CORPUS</text><text x="96" y="268" class="t">Low-resource documents</text><text x="96" y="304" class="b">Urdu / Arabic script</text><text x="96" y="330" class="b">Roman Urdu / English</text><text x="96" y="356" class="tiny">Synthetic now; licensed corpora later</text></g>
<g filter="url(#shadow)"><rect x="390" y="190" width="260" height="200" rx="18" fill="#12334c" stroke="#47728b"/><text x="416" y="228" class="tag">02 PREPROCESS</text><text x="416" y="268" class="t">Normalize and chunk</text><text x="416" y="304" class="b">Unicode and script cleanup</text><text x="416" y="330" class="b">OCR-noise simulation</text><text x="416" y="356" class="tiny">Stable citation chunk IDs</text></g>
<g filter="url(#shadow)"><rect x="710" y="190" width="260" height="200" rx="18" fill="#12334c" stroke="#47728b"/><text x="736" y="228" class="tag">03 RETRIEVE</text><text x="736" y="268" class="t">Lexical + hybrid IR</text><text x="736" y="304" class="b">TF-IDF char n-grams</text><text x="736" y="330" class="b">BM25-style baseline</text><text x="736" y="356" class="tiny">Embedding adapter documented</text></g>
<g filter="url(#shadow)"><rect x="1030" y="190" width="340" height="200" rx="18" fill="#12334c" stroke="#47728b"/><text x="1056" y="228" class="tag">04 ANSWER</text><text x="1056" y="268" class="t">Citation-grounded QA</text><text x="1056" y="304" class="b">Extractive answer only</text><text x="1056" y="330" class="b">Refusal for unsupported queries</text><text x="1056" y="356" class="tiny">Grounding and hallucination-risk checks</text></g>
<path d="M330 290 H382" stroke="#b9d7e8" stroke-width="3" marker-end="url(#arr)"/><path d="M650 290 H702" stroke="#b9d7e8" stroke-width="3" marker-end="url(#arr)"/><path d="M970 290 H1022" stroke="#b9d7e8" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="150" y="500" width="330" height="150" rx="18" fill="#153f49" stroke="#3b8b94"/><text x="176" y="536" class="tag">ROBUSTNESS</text><text x="176" y="575" class="t">OCR-noise experiments</text><text x="176" y="608" class="b">Missing punctuation, spacing, character confusion</text></g>
<g filter="url(#shadow)"><rect x="555" y="500" width="330" height="150" rx="18" fill="#38324a" stroke="#8775a8"/><text x="581" y="536" class="tag">FAIRNESS</text><text x="581" y="575" class="t">Language recall gaps</text><text x="581" y="608" class="b">Compare Urdu, Arabic, English, Roman Urdu</text></g>
<g filter="url(#shadow)"><rect x="960" y="500" width="330" height="150" rx="18" fill="#493923" stroke="#bd8e4f"/><text x="986" y="536" class="tag">AUDIT</text><text x="986" y="575" class="t">Reports and hash log</text><text x="986" y="608" class="b">CSV, figures, Markdown, JSONL audit trail</text></g>
<text x="70" y="715" class="tiny">The repository ships synthetic fictional documents only. Real corpora require licensing, privacy review, and native-speaker evaluation.</text>
</svg>
